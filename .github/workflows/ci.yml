name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  test-and-coverage:
    name: Windows Native
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit on Windows
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          Invoke-RestMethod https://cli.moonbitlang.com/install/powershell.ps1 | Invoke-Expression
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show toolchain versions
        shell: bash
        run: moon version --all

      - name: Run native tests
        shell: bash
        run: moon test --target native -v --target-dir .moonbuild/native

      - name: Run coverage tests
        shell: bash
        run: moon test --target native --enable-coverage -v --target-dir .moonbuild/coverage-native

      - name: Export Cobertura coverage
        shell: bash
        run: |
          mkdir -p coverage
          moon coverage report --target-dir .moonbuild/coverage-native -f cobertura -o coverage/windows.xml
          test -f coverage/windows.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          disable_search: true
          fail_ci_if_error: true
          files: coverage/windows.xml
          name: windows-native
          use_oidc: true
          verbose: true
